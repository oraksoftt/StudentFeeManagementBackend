name:  .NET Core Clean Architecture  Deployment CI

on:
  push:
    branches:
      - main
      

  pull_request:
    branches:
      - main
      

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore Packages
        run: dotnet restore StudentFeeManagement.sln

      - name: Build Solution
        run: dotnet build StudentFeeManagement.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test StudentFeeManagement.sln --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish src/StudentFee.API/StudentFee.API.csproj -c Release -o publish