name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: StudentFeeManagement

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore StudentFeeManagement.sln

      - name: Build
        run: dotnet build StudentFeeManagement.sln --no-restore

      - name: Test
        run: dotnet test StudentFeeManagement.sln --no-build --verbosity normal

      # --- AZURE DEPLOYMENT STEPS ---

      # 1. Publish the Web API project that actually exists in the solution.
      # Because `defaults.run.working-directory` is StudentFeeManagement, this run executes in that folder.
      - name: Publish API
        run: dotnet publish StudentFee.API.csproj -c Release -o ./publish

      # 2. Deploy the published files directly to Azure.
      # `uses` steps do not inherit the `defaults.run.working-directory`, so the package path is relative to the repo root.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'your-azure-webapp-name' # Replace with your exact Azure Web App name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./StudentFeeManagement/publish
