name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: StudentFeeManagement

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore StudentFeeManagement.sln

      - name: Build
        run: dotnet build StudentFeeManagement.sln --no-restore

      - name: Test
        run: dotnet test StudentFeeManagement.sln --no-build --verbosity normal